name: Meika Deep Security Scan

on:
workflow_run:
workflows:
- Meika PR Security Gate
types:
- completed

schedule:
- cron: "0 2 * * *"

workflow_dispatch:

env:
FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
deep-scan:
if: >
${{
github.event_name == 'workflow_dispatch' ||
github.event_name == 'schedule' ||
github.event.workflow_run.conclusion == 'success'
}}

```
runs-on: ubuntu-latest
timeout-minutes: 45

env:
  CI_SECURITY_BYPASS: "1"
  PYTHONPATH: .
  DB_HOST: localhost
  DB_NAME: test_db
  DB_USER: test_user
  DB_PASSWORD: test_pass
  SIGNING_PRIVATE_KEY: dummy_test_key_123

steps:
  # --------------------
  # Checkout
  # --------------------
  - uses: actions/checkout@v4

  # --------------------
  # Python
  # --------------------
  - uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  # --------------------
  # Install
  # --------------------
  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip

      pip install -r requirements.txt

      pip install \
        schemathesis==4.10.2 \
        hypothesis==6.138.15 \
        pynguin==0.45.0 \
        cyclonedx-bom==7.1.0 \
        uvicorn==0.35.0

  # --------------------
  # Start API
  # --------------------
  - name: Start Server
    run: |
      uvicorn app.main:app \
        --host 0.0.0.0 \
        --port 8000 &

      timeout 90s bash -c '
      until curl -sf http://127.0.0.1:8000/openapi.json > /dev/null; do
        sleep 1
      done
      '

  # --------------------
  # OWASP ZAP
  # --------------------
  - name: OWASP ZAP
    uses: zaproxy/action-full-scan@v0.10.0
    with:
      target: "http://127.0.0.1:8000"
      cmd_options: "-a -r zap-report.html -J zap-report.json"
    continue-on-error: true

  # --------------------
  # Nuclei
  # --------------------
  - name: Nuclei Scan
    uses: projectdiscovery/nuclei-action@v3
    with:
      args: -u http://127.0.0.1:8000 -json -o nuclei.json
    continue-on-error: true

  # --------------------
  # Show Findings
  # --------------------
  - name: Show Nuclei Findings
    run: |
      echo "---- NUCLEI RESULTS ----"
      cat nuclei.json || echo "No nuclei findings"

  - name: Show ZAP Findings
    run: |
      echo "---- ZAP SUMMARY ----"
      cat zap-report.json || echo "No ZAP report"

  # --------------------
  # API Fuzzing
  # --------------------
  - name: Schemathesis
    run: |
      schemathesis run \
        --max-failures=1 \
        http://localhost:8000/openapi.json

  # --------------------
  # Logic Fuzzing
  # --------------------
  - name: Pynguin
    env:
      PYNGUIN_DANGER_AWARE: 1
    run: |
      mkdir -p fuzz_results

      pynguin \
        --project-path . \
        --output-path ./fuzz_results \
        --module-name app.security.pipeline \
        --maximum-search-time 60 || true

  # --------------------
  # Red Team
  # --------------------
  - name: Red Team Suite
    run: |
      pytest app/security/tests/test_red_team_attacks.py -v || true

  # --------------------
  # SBOM
  # --------------------
  - name: Generate SBOM
    run: |
      cyclonedx-py requirements -o bom.json

  # --------------------
  # Security Summary
  # --------------------
  - name: Security Summary
    run: |
      python scripts/security_summary.py || true

  # --------------------
  # Upload Results
  # --------------------
  - name: Upload Security Results
    uses: actions/upload-artifact@v4
    with:
      name: deep-security-results
      retention-days: 30
      if-no-files-found: ignore
      path: |
        fuzz_results/
        bom.json
        zap-report.html
        zap-report.json
        nuclei.json
```
