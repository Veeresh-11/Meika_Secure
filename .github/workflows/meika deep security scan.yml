name: Meika Deep Security Scan

on:
  workflow_run:
    workflows: ["Meika PR Security Gate"]
    types:
      - completed

  schedule:
    - cron: "0 2 * * *"

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deep-scan:
    # Run only if PR Gate passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # --------------------
      # Checkout
      # --------------------
      - uses: actions/checkout@v4

      # --------------------
      # Python Setup
      # --------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # --------------------
      # Install
      # --------------------
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install schemathesis hypothesis pynguin cyclonedx-bom uvicorn jq

      # --------------------
      # Start Server (CI Safe)
      # --------------------
      - name: Start Server
        run: |
          export CI_SECURITY_BYPASS=1
          export DB_HOST=localhost
          export DB_NAME=test_db
          export DB_USER=test_user
          export DB_PASSWORD=test_pass
          export SIGNING_PRIVATE_KEY=dummy_test_key_123

          uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          timeout 90s bash -c '
          until curl -sf http://127.0.0.1:8000/openapi.json > /dev/null; do
            sleep 1
          done
          '

      # --------------------
      # OWASP ZAP Scan
      # --------------------
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://127.0.0.1:8000"
          cmd_options: "-a -r zap-report.html -J zap-report.json"
        env:
          ZAP_USE_LOCAL_PROXY: true
        continue-on-error: true

      # --------------------
      # NUCLEI SCAN (FIXED)
      # --------------------
      - name: Nuclei Scan
        uses: projectdiscovery/nuclei-action@v3
        with:
          args: -u http://127.0.0.1:8000 -json -o nuclei.json
        continue-on-error: true

      # --------------------
      # Show Findings
      # --------------------
      - name: Show Nuclei Findings
        run: |
          echo "---- NUCLEI RESULTS ----"
          cat nuclei.json || echo "No nuclei findings"

      - name: Show ZAP Findings
        run: |
          echo "---- ZAP SUMMARY ----"
          cat zap-report.json | jq '.site[].alerts[] | {name: .alert, risk: .riskdesc}' || echo "No ZAP issues"

      # --------------------
      # API Fuzzing
      # --------------------
      - name: API Fuzz
        run: schemathesis run http://localhost:8000/openapi.json

      # --------------------
      # Logic Fuzzing
      # --------------------
      - name: Pynguin
        env:
          PYNGUIN_DANGER_AWARE: 1
        run: |
          mkdir -p fuzz_results
          echo "start" > fuzz_results/info.txt
          pynguin --project-path . \
                  --output-path ./fuzz_results \
                  --module-name app.security.pipeline \
                  --maximum-search-time 60 || true

      # --------------------
      # Red Team Tests
      # --------------------
      - name: Red Team Suite
        run: pytest app/security/tests/test_red_team_attacks.py -v || true

      # --------------------
      # SBOM
      # --------------------
      - name: SBOM
        run: cyclonedx-py requirements -o bom.json

      # --------------------
      # Security Summary
      # --------------------
      - name: Security Summary
        run: python scripts/security_summary.py

      # --------------------
      # Upload Artifacts
      # --------------------
      - name: Upload Security Results
        uses: actions/upload-artifact@v4
        with:
          name: deep-security-results
          path: |
            fuzz_results/
            bom.json
            zap-report.html
            zap-report.json
            nuclei.json
          if-no-files-found: ignore
