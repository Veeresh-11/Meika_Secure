name: Meika Deep Security Scan

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  workflow_run:
    workflows:
      - "Meika PR Security Gate"
    types:
      - completed
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  deep-scan:
    # Only run if the gate workflow succeeded (or if triggered manually/scheduled)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60   # ZAP + Nuclei + Schemathesis + pip-audit + bandit all take time

    # ── FIX 1: PostgreSQL service — API server crashes without DB ─────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # ── Security bypass for deep scan ─────────────────────────────────────
      CI_SECURITY_BYPASS: "1"
      PYTHONPATH: "."

      # ── DB (match service above) ──────────────────────────────────────────
      DB_HOST: "localhost"
      DB_PORT: "5432"
      DB_NAME: "test_db"
      DB_USER: "test_user"
      DB_PASSWORD: "test_pass"
      DATABASE_URL: "postgresql://test_user:test_pass@localhost:5432/test_db"

      # ── Redis ─────────────────────────────────────────────────────────────
      REDIS_URL: "redis://localhost:6379/0"

      # ── App secrets (CI-only, not production) ─────────────────────────────
      SIGNING_PRIVATE_KEY: "dummy_test_key_123"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      JWT_ISSUER: "https://meika.test"
      ALGORITHM: "EdDSA"
      ENVIRONMENT: "test"

      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────────────
      # 2. Python
      # ────────────────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ────────────────────────────────────────────────────────────────────────
      # 3. Install Dependencies
      # ────────────────────────────────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          # Deep-scan specific packages
          pip install \
            pytest==8.3.5 \
            pytest-asyncio==0.25.3 \
            pytest-mock==3.14.0 \
            psycopg2-binary==2.9.10 \
            redis==5.2.1 \
            httpx==0.28.1 \
            anyio==4.8.0 \
            schemathesis==4.10.2 \
            hypothesis==6.138.15 \
            pynguin==0.45.0 \
            cyclonedx-bom==7.1.0 \
            pip-audit==2.10.1 \
            bandit==1.9.4 \
            uvicorn==0.35.0

      # ────────────────────────────────────────────────────────────────────────
      # 4. Run DB migrations before starting server
      #    NOTE: migration ordering issue (schema "identity" does not exist)
      #    is a separate, repo-level fix — tracked outside this workflow file.
      # ────────────────────────────────────────────────────────────────────────
      - name: Run DB Migrations
        run: |
          until pg_isready -h localhost -p 5432 -U test_user; do
            echo "Waiting for postgres..."
            sleep 2
          done
          if [ -d migrations ]; then
            for f in $(ls migrations/*.sql 2>/dev/null | sort); do
              echo "Applying: $f"
              PGPASSWORD=test_pass psql \
                -h localhost -p 5432 \
                -U test_user -d test_db \
                -f "$f" || echo "Warning: $f had errors (continuing)"
            done
          fi

      # ────────────────────────────────────────────────────────────────────────
      # 5. Start API Server
      # ────────────────────────────────────────────────────────────────────────
      - name: Start API Server
        run: |
          uvicorn app.main:app \
            --host 0.0.0.0 \
            --port 8000 \
            --log-level info \
            > /tmp/uvicorn.log 2>&1 &
          echo "Waiting for API server to be ready..."
          timeout 90s bash -c '
            until curl -sf http://127.0.0.1:8000/openapi.json > /dev/null 2>&1; do
              echo "  still waiting..."
              sleep 2
            done
          ' || {
            echo "FATAL: API server did not start in 90s. Logs:"
            cat /tmp/uvicorn.log
            exit 1
          }
          echo "API server is up."
          curl -s http://127.0.0.1:8000/openapi.json | python3 -m json.tool | head -20

      # ────────────────────────────────────────────────────────────────────────
      # FIX 2 — OWASP ZAP: removed duplicate -J flag.
      # The action already injects its own -J report_json.json internally;
      # passing a second -J caused the action's own report-lookup step to
      # fail ("Failed to locate the json report generated by ZAP Scan!")
      # even though the scan itself completed (141 PASS, 0 High/Medium).
      # We rename the action's default output ourselves in the next step.
      # ────────────────────────────────────────────────────────────────────────
      - name: OWASP ZAP Scan
        uses: zaproxy/action-full-scan@v0.12.0
        continue-on-error: true
        with:
          target: "http://127.0.0.1:8000"
          cmd_options: "-r zap-report.html -I"
          fail_action: false
          allow_issue_writing: false

      - name: Normalize ZAP JSON report name
        if: always()
        run: |
          if [ -f report_json.json ]; then
            cp report_json.json zap-report.json
          fi

      - name: Show ZAP Findings
        if: always()
        run: |
          echo "---- ZAP SUMMARY ----"
          if [ -f zap-report.json ]; then
            python3 -c "
          import json, sys
          try:
              d = json.load(open('zap-report.json'))
              alerts = d.get('site', [{}])[0].get('alerts', [])
              highs = [a for a in alerts if a.get('riskdesc','').startswith('High')]
              mediums = [a for a in alerts if a.get('riskdesc','').startswith('Medium')]
              print(f'High risk: {len(highs)}, Medium risk: {len(mediums)}, Total: {len(alerts)}')
              for a in highs[:5]:
                  print(f'  HIGH: {a.get(\"alert\",\"?\")} — {a.get(\"url\",\"?\")}')
          except Exception as e:
              print(f'Could not parse ZAP report: {e}')
          "
          else
            echo "No ZAP report generated"
          fi

      # ────────────────────────────────────────────────────────────────────────
      # FIX 3 — Nuclei: v2 action does not accept a generic `args:` input.
      # Only named inputs are recognized (target, output, json, flags, etc).
      # Passing `args:` silently dropped every option, so nuclei had no
      # target and failed immediately ("You need to set a target...").
      #
      # FIX 3b — `json: true` maps to the legacy `-json` flag, which Nuclei
      # 3.11 removed entirely (replaced by `-je`/json-export). The action
      # still injects `-json` when this input is true, so it crashed with
      # "flag provided but not defined: -json". Use `json-export:` directly
      # instead, which maps to the current `-je` flag.
      #
      # FIX 3c — `-es` (exclude-severity) requires a value right after it.
      # Our flag string put `-nh` immediately after `-es`, so nuclei read
      # `-nh` as an (invalid) severity value: "invalid value \"-nh\" for
      # flag -es". We never actually wanted to exclude a severity tier —
      # `-es` served no purpose here, so it's dropped entirely.
      # ────────────────────────────────────────────────────────────────────────
      - name: Nuclei Scan
        uses: projectdiscovery/nuclei-action@v2
        continue-on-error: true
        with:
          target: "http://127.0.0.1:8000"
          json-export: nuclei.json
          flags: -nh -timeout 10 -rate-limit 50

      - name: Show Nuclei Findings
        if: always()
        run: |
          echo "---- NUCLEI RESULTS ----"
          if [ -f nuclei.json ] && [ -s nuclei.json ]; then
            python3 -c "
          import json, sys
          findings = []
          with open('nuclei.json') as f:
              for line in f:
                  line = line.strip()
                  if line:
                      try: findings.append(json.loads(line))
                      except: pass
          crits = [x for x in findings if x.get('info',{}).get('severity') in ['critical','high']]
          print(f'Total findings: {len(findings)}, Critical/High: {len(crits)}')
          for c in crits[:10]:
              print(f'  [{c[\"info\"][\"severity\"].upper()}] {c[\"info\"][\"name\"]} — {c.get(\"matched-at\",\"?\")}')
          "
          else
            echo "No Nuclei findings or empty report"
          fi

      # ────────────────────────────────────────────────────────────────────────
      # FIX 4 — Schemathesis: CLI flags renamed in 4.x.
      # --hypothesis-max-examples -> --max-examples
      # --hypothesis-suppress-health-check -> --suppress-health-check
      # The old flags caused an immediate usage error, so zero API fuzzing
      # actually ran (silently swallowed by `|| true`).
      #
      # FIX 4b — --junit-xml is not a valid option on the installed 4.10.2
      # CLI ("No such option '--junit-xml'"), so it aborted before running
      # a single test. Dropped; --report already gives a readable summary.
      #
      # FIX 4c — --show-trace is also not a valid option on this CLI
      # ("No such option '--show-trace'"). Same story — dropped.
      # ────────────────────────────────────────────────────────────────────────
      - name: API Fuzzing (Schemathesis)
        continue-on-error: true
        run: |
          schemathesis run \
            http://localhost:8000/openapi.json \
            --checks all \
            --max-examples=50 \
            --suppress-health-check=too_slow,filter_too_much \
            --continue-on-failure \
            --report=schemathesis-report.txt \
            || true
          echo "---- SCHEMATHESIS RESULTS ----"
          cat schemathesis-report.txt 2>/dev/null || echo "No report generated"

      # ────────────────────────────────────────────────────────────────────────
      # NEW — Dependency Vulnerability Audit (pip-audit)
      # Checks pinned requirements.txt versions against known CVEs.
      # Was already being installed but never actually run — pure waste.
      # ────────────────────────────────────────────────────────────────────────
      - name: Dependency Vulnerability Audit (pip-audit)
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --desc -f json -o pip-audit-report.json || true
          echo "---- PIP-AUDIT SUMMARY ----"
          if [ -f pip-audit-report.json ]; then
            python3 -c "
          import json
          try:
              d = json.load(open('pip-audit-report.json'))
              deps = d.get('dependencies', [])
              vulns = [x for x in deps if x.get('vulns')]
              print(f'Vulnerable packages: {len(vulns)}')
              for v in vulns[:10]:
                  ids = [i.get('id','?') for i in v.get('vulns', [])]
                  print(f\"  {v.get('name','?')}=={v.get('version','?')}: {ids}\")
          except Exception as e:
              print(f'Could not parse pip-audit report: {e}')
          "
          else
            echo "No pip-audit report generated"
          fi

      # ────────────────────────────────────────────────────────────────────────
      # NEW — Static Analysis (bandit)
      # Catches insecure code patterns (hardcoded secrets, eval usage, weak
      # crypto, etc.) that HTTP-level scanners (ZAP/Nuclei) can't see.
      # Was already being installed but never actually run — pure waste.
      # ────────────────────────────────────────────────────────────────────────
      - name: Static Analysis (bandit)
        continue-on-error: true
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          echo "---- BANDIT SUMMARY ----"
          if [ -f bandit-report.json ]; then
            python3 -c "
          import json
          try:
              d = json.load(open('bandit-report.json'))
              results = d.get('results', [])
              highs = [r for r in results if r.get('issue_severity') == 'HIGH']
              mediums = [r for r in results if r.get('issue_severity') == 'MEDIUM']
              print(f'Total issues: {len(results)}, High: {len(highs)}, Medium: {len(mediums)}')
              for r in (highs + mediums)[:10]:
                  print(f\"  [{r.get('issue_severity')}] {r.get('test_name','?')} — {r.get('filename','?')}:{r.get('line_number','?')}\")
          except Exception as e:
              print(f'Could not parse bandit report: {e}')
          "
          else
            echo "No bandit report generated"
          fi

      # ────────────────────────────────────────────────────────────────────────
      # 9. Logic Fuzzing (Pynguin)
      # ────────────────────────────────────────────────────────────────────────
      - name: Logic Fuzzing (Pynguin)
        env:
          PYNGUIN_DANGER_AWARE: "1"
        run: |
          mkdir -p fuzz_results
          pynguin \
            --project-path . \
            --output-path ./fuzz_results \
            --module-name app.security.pipeline \
            --maximum-search-time 60 \
            --seed 42 \
            || true
          echo "Pynguin output:"
          ls -la fuzz_results/ 2>/dev/null || echo "No fuzz results"

      # ────────────────────────────────────────────────────────────────────────
      # 10. Red Team Suite
      #     NOTE: currently skipped — app/security/tests/test_red_team_attacks.py
      #     does not exist yet in the repo. This is a repo-level fix, not a
      #     workflow-file fix.
      # ────────────────────────────────────────────────────────────────────────
      - name: Red Team Suite
        run: |
          if [ -f app/security/tests/test_red_team_attacks.py ]; then
            pytest app/security/tests/test_red_team_attacks.py \
              -v \
              --tb=short \
              --asyncio-mode=auto \
              || true
          else
            echo "Red team test file not found — skipping"
          fi

      # ────────────────────────────────────────────────────────────────────────
      # 11. Generate SBOM
      # ────────────────────────────────────────────────────────────────────────
      - name: Generate SBOM
        run: |
          cyclonedx-py requirements \
            --of JSON \
            -o bom.json \
            requirements.txt
          echo "SBOM generated:"
          python3 -c "
          import json
          d = json.load(open('bom.json'))
          components = d.get('components', [])
          print(f'  {len(components)} components in SBOM')
          "

      # ────────────────────────────────────────────────────────────────────────
      # 12. Security Summary
      # ────────────────────────────────────────────────────────────────────────
      - name: Security Summary
        if: always()
        run: |
          python3 scripts/security_summary.py 2>/dev/null || {
            echo "---- SECURITY SCAN SUMMARY ----"
            echo "ZAP:          $([ -f zap-report.json ]  && echo 'report generated' || echo 'no report')"
            echo "Nuclei:       $([ -f nuclei.json ]       && echo 'report generated' || echo 'no report')"
            echo "Schemathesis: $([ -f schemathesis-report.txt ] && echo 'report generated' || echo 'no report')"
            echo "Pip-audit:    $([ -f pip-audit-report.json ] && echo 'report generated' || echo 'no report')"
            echo "Bandit:       $([ -f bandit-report.json ] && echo 'report generated' || echo 'no report')"
            echo "SBOM:         $([ -f bom.json ]          && echo 'generated' || echo 'missing')"
          }

      # ────────────────────────────────────────────────────────────────────────
      # 13. Upload ALL security artifacts
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload Security Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-security-results
          retention-days: 30
          if-no-files-found: ignore
          path: |
            fuzz_results/
            bom.json
            zap-report.html
            zap-report.json
            nuclei.json
            schemathesis-report.txt
            pip-audit-report.json
            bandit-report.json
            /tmp/uvicorn.log

      # ────────────────────────────────────────────────────────────────────────
      # 14. Print server logs on failure for debugging
      # ────────────────────────────────────────────────────────────────────────
      - name: Print API Server Logs (on failure)
        if: failure()
        run: |
          echo "=== Uvicorn startup log ==="
          cat /tmp/uvicorn.log || echo "No log available"
