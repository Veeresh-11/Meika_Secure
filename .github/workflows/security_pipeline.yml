name: Meika Secure ID

on: [push, pull_request]

jobs:
  security-and-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 1. Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
           python -m pip install --upgrade pip
           pip install pytest pynguin bandit safety hypothesis schemathesis cyclonedx-bom
           if [ -f requirement.txt ]; then pip install -r requirements.txt; fi

      - name: 2. Dependency Audit (Snyk/Safety)
        uses: snyk/actions/python@master
        env:
          SYNK_TOKEN: ${{ secrets.SYNK_TOKEN }}
        continue-on-error: true #Safety check runs if Snyk is missing token

      - name: 3. static Analysis (Bandit)
        run: bandit -r app/ -ll

      - name: 4. Run Kernal Tests (Pytest+Hypothesis)
        run: pytest 

      - name: 4. Property-Based Testing (Hypothesis)
        run: pytest # Hypothesis runs inside your pytest

      - name: 5. API Fuzzing (Schemathesis)
        run:  |
           # This assumes your web app is running or has a schema file
           # st run ./openapi.json --checks all
           echo "Ready for dynamic API attack simulation"

      - name: SBOM Generation (Transparency)
        run: cyclonedx-py app -o bom.json
           
      - name: 6. Logic Stress-Test (Pynguin)
        env:
          PYNGUIN_DANGER_AWARE: 1
        run: |
          #Use a loop to test the mist critical security files in your system
          for module in app.security.pipeline app.security.auth_manager app.security.token_logic; do
            pynguin --project-path . --output-path ./fuzz_results/$module --module-name $module --maximum-search-time 60
          done
          
          
         
