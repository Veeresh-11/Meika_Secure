name: Meika Secure ID

on: [push, pull_request]

jobs:
  security-and-logic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ----------------------------------------
      # 1. Secret Scan
      # ----------------------------------------
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------
      # Install Dependencies
      # ----------------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          # Core tools
          pip install pytest pytest-mock pynguin bandit safety hypothesis schemathesis cyclonedx-bom

          # Project dependencies
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ----------------------------------------
      # 2. Dependency Audit
      # ----------------------------------------
      - name: Dependency Audit (Snyk)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # ----------------------------------------
      # 3. Static Analysis
      # ----------------------------------------
      - name: Static Analysis (Bandit)
        run: bandit -r app/ -ll

      # ----------------------------------------
      # 4. Run Tests
      # ----------------------------------------
      - name: Run Kernel Tests (Pytest + Hypothesis)
        run: pytest -q

      # ----------------------------------------
      # 5. API Fuzzing (optional)
      # ----------------------------------------
      - name: API Fuzzing (Schemathesis)
        run: |
          echo "Ready for dynamic API attack simulation"

      # ----------------------------------------
      # 6. SBOM
      # ----------------------------------------
      - name: SBOM Generation
        run: cyclonedx-py requirements -o bom.json

      # ----------------------------------------
      # 7. Logic Stress Test (Pynguin)
      # ----------------------------------------
      - name: Logic Stress-Test (Pynguin)
        env:
          PYNGUIN_DANGER_AWARE: 1
        run: |
          for module in app.security.pipeline app.security.context app.security.device_snapshot; do
            pynguin \
              --project-path . \
              --output-path ./fuzz_results/$module \
              --module-name $module \
              --maximum-search-time 60 || true
          done
