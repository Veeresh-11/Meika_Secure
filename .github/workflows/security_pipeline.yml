name: Meika Secure ID

on: [push, pull_request]

jobs:
  security-and-logic:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # 0. Checkout
      # ----------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------
      # 1. Python Setup
      # ----------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ----------------------------------------
      # 2. Secret Scan
      # ----------------------------------------
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2.3.7

      # ----------------------------------------
      # 3. Install Dependencies
      # ----------------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install runtime dependencies FIRST
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
          # Install dev tools separately
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      # ----------------------------------------
      # 4. Dependency Audit (STRICT - runtime only)
      # ----------------------------------------
      - name: Dependency Audit (pip-audit runtime only)
        run: pip-audit -r requirements.txt

      - name: Dependency Audit (Snyk)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # ----------------------------------------
      # 5. Static Analysis
      # ----------------------------------------
      - name: Static Analysis (Bandit)
        run: bandit -r app/ -lll

      # ----------------------------------------
      # 6. Run Tests + Coverage
      # ----------------------------------------
      - name: Run Tests (Pytest + Hypothesis)
        run: pytest --cov=app --cov-report=term --cov-fail-under=80

      # ----------------------------------------
      # 7. Security Attack Tests
      # ----------------------------------------
      - name: Security Attack Tests
        run: pytest app/security/test_security_attacks.py -q

      # ----------------------------------------
      # 8. API Fuzzing (placeholder)
      # ----------------------------------------
      - name: API Fuzzing (Schemathesis)
        run: echo "Schemathesis ready (integrate OpenAPI later)"

      # ----------------------------------------
      # 9. SBOM Generation
      # ----------------------------------------
      - name: SBOM Generation
        run: cyclonedx-py requirements -o bom.json

      # ----------------------------------------
      # 10. Logic Stress Test (Short Fuzz)
      # ----------------------------------------
      - name: Logic Stress-Test (Pynguin)
        env:
          PYNGUIN_DANGER_AWARE: 1
        run: |
          mkdir -p fuzz_results
          for module in app.security.pipeline app.security.context app.security.device_snapshot; do
            pynguin \
              --project-path . \
              --output-path ./fuzz_results/$module \
              --module-name $module \
              --maximum-search-time 60 || true
          done

      # ----------------------------------------
      # 11. Upload Artifacts
      # ----------------------------------------
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json

      - name: Upload Fuzz Results
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-results
          path: fuzz_results/
