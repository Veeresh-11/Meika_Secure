name: Meika Secure ID - Ultimate Free Invasive Scan

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-and-logic:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 1. DEEP SEMANTIC INITIALIZATION
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install schemathesis pytest pytest-cov bandit hypothesis cyclonedx-bom pynguin pip-audit uvicorn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 2. FREE DEPENDENCY & STATIC ATTACKS
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Static Analysis (Bandit)
        run: bandit -r app/ -lll

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1 # Fixed Organization Name
        with:
          config: p/owasp-top-ten p/security-audit p/secrets
          generateSarif: true

      # 3. START APP FOR LIVE ATTACKS
      - name: Start App in Background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 & 
          sleep 10 

      # 4. ACTIVE PENETRATION TESTING
      - name: OWASP ZAP Full Attack Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:8000'
          token: ${{ secrets.GITHUB_TOKEN }}
          cmd_options: '-a'

      - name: Nuclei Vulnerability Scan
        uses: projectdiscovery/nuclei-action@main # Fixed Version Tag
        with:
          target: 'http://localhost:8000'
          flags: "-severity low,medium,high,critical -daa" 

      # 5. LOGIC & API ATTACKS
      - name: Run Tests (Pytest + Hypothesis)
        run: pytest --cov=app --cov-report=term --cov-fail-under=80

      - name: Security Attack Tests
        run: pytest app/security/test_security_attacks.py -v

      - name: API Fuzzing (Schemathesis)
        run: schemathesis run --checks all --skip-deprecated-check http://localhost:8000/openapi.json

      - name: Logic Stress-Test (Pynguin)
        env:
          PYNGUIN_DANGER_AWARE: 1
        run: |
          mkdir -p fuzz_results
          for module in app.security.pipeline app.security.context app.security.device_snapshot; do
            pynguin --project-path . --output-path ./fuzz_results/$module --module-name $module --maximum-search-time 60 || true
          done

      # 6. FINALIZE & REPORTING
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: SBOM Generation
        run: cyclonedx-py requirements -o bom.json

      - name: Upload Security Bundle
        uses: actions/upload-artifact@v4
        with:
          name: meika-freedom-results
          path: |
            fuzz_results/
            semgrep.sarif
          if-no-files-found: ignore
