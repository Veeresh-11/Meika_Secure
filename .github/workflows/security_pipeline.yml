name: Meika Secure ID - Ultimate Invasive Attack

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # SELECT THIS NAME: 'security-and-logic' in Branch Protection to block merges
  security-and-logic:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 1. DEEP SEMANTIC INITIALIZATION (CodeQL)
      # Must happen first to map the unique code structure
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install schemathesis pytest pytest-cov bandit hypothesis cyclonedx-bom pynguin pip-audit uvicorn
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 2. DEPENDENCY ATTACKS
      - name: Dependency Audit (pip-audit)
        run: pip-audit --strict --vulnerability-service osv

      - name: Dependency Audit (Snyk - Hard Gate)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high 

      # 3. STATIC ANALYSIS
      - name: Static Analysis (Bandit)
        run: bandit -r app/ -lll

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten p/security-audit p/secrets
          generateSarif: true

      # 3. START APP FOR LIVE AI ATTACKS
      - name: Start App in Background
        run: |
          # Replace 'app.main:app' with your actual entry point
          uvicorn app.main:app --host 0.0.0.0 --port 8000 & 
          sleep 10 # Extra time for AI tools to find the port

      # 4. AI PENTESTING (Shannon & Zen AI)
      # These actively "attack" your build to prove vulnerabilities
      - name: Run Shannon AI Pentester
        uses: KeygraphHQ/shannon-action@main
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          target-url: "http://localhost:8000"

      - name: Run Tests (Pytest + Hypothesis)
        run: pytest --cov=app --cov-report=term --cov-fail-under=80

      - name: Security Attack Tests
        run: pytest app/security/test_security_attacks.py -v

      - name: Zen AI Autonomous Pentest
        uses: actions/zen-ai-pentest@v3
        with:
          scan-type: "aggressive"
          api-key: ${{ secrets.OPENAI_API_KEY }}
          target-url: "http://localhost:8000"

      # 5. INVASIVE FUZZING & LOGIC TESTS
      - name: API Fuzzing (Schemathesis)
        run: |
          schemathesis run --checks all --skip-deprecated-check http://localhost:8000/openapi.json

      - name: Logic Stress-Test (Pynguin)
        env:
          PYNGUIN_DANGER_AWARE: 1
        run: |
          mkdir -p fuzz_results
          for module in app.security.pipeline app.security.context app.security.device_snapshot; do
            pynguin --project-path . --output-path ./fuzz_results/$module --module-name $module --maximum-search-time 60 || true
          done

      # 6. FINALIZE DEEP SCAN & REPORTING
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: SBOM Generation
        run: cyclonedx-py requirements -o bom.json

      - name: Upload Security Bundle
        uses: actions/upload-artifact@v4
        with:
          name: meika-ultimate-results
          path: |
            bom.json
            fuzz_results/
            semgrep.sarif
          if-no-files-found: ignore
