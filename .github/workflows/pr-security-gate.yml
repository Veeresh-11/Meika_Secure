name: Meika PR Security Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    env:
      PYTHONPATH: .
      DB_HOST: localhost
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_pass
      SIGNING_PRIVATE_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      # --------------------
      # Checkout
      # --------------------
      - uses: actions/checkout@v4

      # --------------------
      # Python
      # --------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # --------------------
      # CodeQL Init
      # --------------------
      - uses: github/codeql-action/init@v3
        with:
          languages: python

      # --------------------
      # Install
      # --------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install \
            pytest==8.4.2 \
            pytest-cov==6.2.1 \
            pip-audit==2.9.0 \
            "bandit[sarif]==1.8.6"

      # --------------------
      # pip-audit SARIF
      # --------------------
      - name: pip-audit SARIF
        run: |
          pip-audit -f sarif -o pip-audit.sarif || true

          if [ ! -f pip-audit.sarif ]; then
            cat > pip-audit.sarif <<'EOF'
          {
            "version": "2.1.0",
            "runs": []
          }
          EOF
          fi

      # --------------------
      # Bandit SARIF
      # --------------------
      - name: Bandit SARIF
        run: |
          bandit -r app/ -f sarif -o bandit.sarif || true

          if [ ! -f bandit.sarif ]; then
            cat > bandit.sarif <<'EOF'
          {
            "version": "2.1.0",
            "runs": []
          }
          EOF
          fi

      # --------------------
      # Check SARIF Content
      # --------------------
      - name: Check Bandit SARIF
        id: bandit_check
        run: |
          python - <<'PY'
          import json
          try:
              with open("bandit.sarif") as f:
                  data = json.load(f)
              print(f"empty={'true' if len(data.get('runs', [])) == 0 else 'false'}")
          except Exception:
              print("empty=true")
          PY

      - name: Check pip-audit SARIF
        id: audit_check
        run: |
          python - <<'PY'
          import json
          try:
              with open("pip-audit.sarif") as f:
                  data = json.load(f)
              print(f"empty={'true' if len(data.get('runs', [])) == 0 else 'false'}")
          except Exception:
              print("empty=true")
          PY

      # --------------------
      # Upload SARIF
      # --------------------
      - name: Upload Bandit SARIF
        if: steps.bandit_check.outputs.empty != 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

      - name: Upload pip-audit SARIF
        if: steps.audit_check.outputs.empty != 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit.sarif

      # --------------------
      # Tests + Coverage
      # --------------------
      - name: Tests
        run: |
          pytest \
            --cov=app \
            --cov-report=term \
            --cov-fail-under=80

      # --------------------
      # Red Team Smoke
      # --------------------
      - name: Red Team Tests
        run: |
          pytest app/security/tests/test_red_team_attacks.py -v || true

      # --------------------
      # CodeQL Analyze
      # --------------------
      - uses: github/codeql-action/analyze@v3
