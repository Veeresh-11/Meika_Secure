name: Meika PR Security Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write

    env:
      PYTHONPATH: .
      DB_HOST: localhost
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_pass
      SIGNING_PRIVATE_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      # --------------------
      # Checkout
      # --------------------
      - uses: actions/checkout@v4

      # --------------------
      # Python
      # --------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # --------------------
      # CodeQL Init
      # --------------------
      - uses: github/codeql-action/init@v3
        with:
          languages: python

      # --------------------
      # Install Dependencies
      # --------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install \
            pytest==8.4.2 \
            pytest-cov==6.2.1 \
            pip-audit==2.9.0 \
            "bandit[sarif]==1.8.6"

      # --------------------
      # Dependency Audit
      # --------------------
      - name: Dependency Audit
        run: |
          pip-audit

      # --------------------
      # Bandit SARIF
      # --------------------
      - name: Bandit Scan
        run: |
          bandit -r app/ -f sarif -o bandit.sarif || true

          if [ ! -f bandit.sarif ]; then
            cat > bandit.sarif <<'EOF'
          {
            "version": "2.1.0",
            "runs": []
          }
          EOF
          fi

      # --------------------
      # Check Bandit Results
      # --------------------
      - name: Check Bandit SARIF
        id: bandit_check
        run: |
          if grep -q '"runs": \[\]' bandit.sarif; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      # --------------------
      # Upload Bandit SARIF
      # --------------------
      - name: Upload Bandit SARIF
        if: steps.bandit_check.outputs.empty == 'false'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

      # --------------------
      # Semgrep
      # --------------------
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: auto

      # --------------------
      # Unit Tests + Coverage
      # --------------------
      - name: Tests + Coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term \
            --cov-fail-under=80

      # --------------------
      # Trivy Filesystem Scan
      # --------------------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy.sarif

      # --------------------
      # Upload Trivy Report
      # --------------------
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif
          if-no-files-found: ignore

      # --------------------
      # Red Team Smoke Tests
      # --------------------
      - name: Red Team Tests
        run: |
          pytest app/security/tests/test_red_team_attacks.py -v || true

      # --------------------
      # CodeQL Analyze
      # --------------------
      - uses: github/codeql-action/analyze@v3
