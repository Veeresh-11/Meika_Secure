name: Meika PR Security Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write

    # ✅ GLOBAL ENV FIX (CRITICAL)
    env:
      PYTHONPATH: .
      DB_HOST: localhost
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_pass
      SIGNING_PRIVATE_KEY: dummy_test_key_123

    steps:
      # --------------------
      # Checkout
      # --------------------
      - uses: actions/checkout@v4

      # --------------------
      # Python Setup
      # --------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # --------------------
      # CodeQL Init
      # --------------------
      - uses: github/codeql-action/init@v3
        with:
          languages: python

      # --------------------
      # Install
      # --------------------
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov bandit pip-audit bandit[sarif]
          pip install -r requirements.txt

      # --------------------
      # pip-audit (SAFE SARIF)
      # --------------------
      - name: pip-audit (SARIF)
        run: |
          pip-audit -f sarif -o pip-audit.sarif || true
          if [ ! -f pip-audit.sarif ]; then
            printf '%s\n' \
            '{' \
            '  "version": "2.1.0",' \
            '  "runs": []' \
            '}' > pip-audit.sarif
          fi

      # --------------------
      # Bandit (SAFE SARIF)
      # --------------------
      - name: Bandit (SARIF)
        run: |
          bandit -r app/ -f sarif -o bandit.sarif || true
          if [ ! -f bandit.sarif ]; then
            printf '%s\n' \
            '{' \
            '  "version": "2.1.0",' \
            '  "runs": []' \
            '}' > bandit.sarif
          fi

      # --------------------
      # Check if SARIF is empty
      # --------------------
      - name: Check Bandit SARIF
        id: bandit_check
        run: |
          if grep -q '"runs": \[\]' bandit.sarif; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Check pip-audit SARIF
        id: audit_check
        run: |
          if grep -q '"runs": \[\]' pip-audit.sarif; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      # --------------------
      # Upload ONLY if NOT empty
      # --------------------
      - name: Upload Bandit SARIF
        if: steps.bandit_check.outputs.empty == 'false'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif

      - name: Upload pip-audit SARIF
        if: steps.audit_check.outputs.empty == 'false'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit.sarif

      # --------------------
      # Tests (FIXED)
      # --------------------
      - name: Tests
        run: pytest --cov=app --cov-report=term --cov-fail-under=70

      # --------------------
      # Red Team Tests (non-blocking)
      # --------------------
      - name: Red Team Tests
        run: pytest app/security/tests/test_red_team_attacks.py -v || true

      # --------------------
      # CodeQL Analyze
      # --------------------
      - uses: github/codeql-action/analyze@v3
