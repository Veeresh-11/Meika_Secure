[pytest]
addopts = -ra
testpaths = app/security

markers =
    track_a: Deterministic Security Kernel (Sprint A — LAW, authoritative, frozen)
    track_b: Kernel orchestration & evidence coordination (Sprint B)
    kernel: SecureIDKernel behavior (ALLOW enforcement, fail-closed semantics)
    evidence: Evidence storage, hashing, chaining, append-only guarantees (Track C)
    break_attempt: Adversarial, chaos, and invariant-violation tests
    simulation: Non-authoritative shadow evaluation
    track_c: Evidence Memory / Replay / Retention (Track C)
    postgres: marks tests that require Postgres backend

# LAW only---> pytest -m track_a

# Kernel + Evidence orchestration---> pytest -m track_b

# Kernel only---> pytest -m kernel

# Evidence only---> pytest -m evidence

# Chaos testing---> pytest -m break_attempt

# Everything---> pytest
