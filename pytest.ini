[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# SINGLE SOURCE OF TRUTH for pytest config.
# pyproject.toml had testpaths = ["tests"] which conflicted with this file's
# testpaths = app/ — two config files with conflicting testpaths causes
# pytest EXIT CODE 4 (no tests collected / configuration error).
#
# FIX: pyproject.toml [tool.pytest.ini_options] section has been DELETED.
# This file is now the only pytest config. pytest.ini takes priority over
# pyproject.toml when both exist, but having both causes --strict-config abort.
# ─────────────────────────────────────────────────────────────────────────────

addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --asyncio-mode=auto

# Tests live inside app/ (no separate tests/ directory exists in repo)
testpaths = app/

pythonpath = .

# ── async mode ───────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── All markers (must be declared with --strict-markers) ─────────────────────
markers =
    track_a: Deterministic Security Kernel (Sprint A — LAW, authoritative, frozen)
    track_b: Kernel orchestration & evidence coordination (Sprint B)
    kernel: SecureIDKernel behavior (ALLOW enforcement, fail-closed semantics)
    evidence: Evidence storage, hashing, chaining, append-only guarantees (Track C)
    break_attempt: Adversarial, chaos, and invariant-violation tests
    simulation: Non-authoritative shadow evaluation
    track_c: Evidence Memory / Replay / Retention (Track C)
    postgres: marks tests that require Postgres backend
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require external services

# ── Usage reference ──────────────────────────────────────────────────────────
# LAW only          → pytest -m track_a
# Kernel+Evidence   → pytest -m track_b
# Kernel only       → pytest -m kernel
# Evidence only     → pytest -m evidence
# Chaos testing     → pytest -m break_attempt
# Skip DB tests     → pytest -m "not postgres"
# Everything        → pytest
